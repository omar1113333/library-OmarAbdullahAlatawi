<h2 align="center" style="color: yellow;">Contact Us</h2>
<p class="p1"> We would love to hear from you. If you have any questions</p>


<form class="div1">


<label for="name">Full Name:</label><br>
<input type="text" id="name" placeholder="Enter your name" required><br><br>

<label for="email">Email:</label><br>
<input type="email" id="email" placeholder="example@email.com" required><br><br>

<label for="phone">Phone Number:</label><br>
<input type="tel" id="phone" pattern="[0-9]{10}" placeholder="05xxxxxxxx" required><br><br>

<label for="message">Message:</label><br>
<textarea id="message" rows="5" cols="40"
placeholder="Write your message here..." required></textarea><br><br>

<button type="submit">Send Message</button>


</form>
